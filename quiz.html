<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz</title>
    <!-- Polices et icônes -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <link rel="stylesheet" href="css/dashboard-modern.css">
    <link rel="stylesheet" href="css/quiz.css">
    <!-- <link rel="stylesheet" href="css/style.css"> -->
</head>
<body>
    <canvas id="confettiCanvas" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 9999; display: none;"></canvas>
    <div class="quiz-container">
        <div class="quiz-header">
            <div id="chapterInfo"></div>
            <div class="progress-bar">
                <div id="quizProgress" class="progress-fill"></div>
            </div>
            <div id="progressText" class="progress-text"></div>
        </div>
        
        <div id="questionContainer" class="quiz-content"></div>
        
        <div id="quizControls" class="quiz-navigation" style="display: none;">
            <button id="prevBtn" class="btn btn-secondary" disabled>
                <i class="fas fa-arrow-left"></i>
                Précédent
            </button>
            <button id="nextBtn" class="btn btn-primary" disabled>
                Suivant
                <i class="fas fa-arrow-right"></i>
            </button>
        </div>
    </div>
    
    <script src="js/quiz.js"></script>
</body>
</html>
