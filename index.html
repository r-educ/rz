<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Anti-Sèche Bureautique</title>
    <link rel="stylesheet" href="dashboard-style.css">
</head>
<body>
    <div class="dashboard-container">
        <header class="dashboard-header">
            <h1>📚 Tableau de Bord Pédagogique</h1>
            <p>Gérez vos chapitres et ressources pour la classe de Seconde</p>
            <div class="header-actions">
                <button onclick="showAddChapterModal()" class="btn-primary">
                    ➕ Ajouter un chapitre
                </button>
            </div>
        </header>

        <!-- Statistiques rapides -->
        <div class="stats-container">
            <div class="stat-card">
                <h3>Chapitres</h3>
                <p id="chapterCount">0</p>
            </div>
            <div class="stat-card">
                <h3>Quiz disponibles</h3>
                <p id="quizCount">0</p>
            </div>
            <div class="stat-card">
                <h3>Questions totales</h3>
                <p id="questionCount">0</p>
            </div>
        </div>

        <!-- Liste des chapitres existants -->
        <section class="chapters-section">
            <h2>📖 Mes chapitres</h2>
            <div id="chaptersGrid" class="chapters-grid">
                <!-- Les chapitres seront chargés dynamiquement ici -->
            </div>
        </section>

        <!-- Modal pour ajouter un chapitre -->
        <div id="addChapterModal" class="modal">
            <div class="modal-content">
                <span class="close" onclick="closeModal()">&times;</span>
                <h2>➕ Ajouter un nouveau chapitre</h2>
                
                <form id="chapterForm" onsubmit="createChapter(event)">
                    <div class="form-group">
                        <label for="chapterName">Nom du chapitre :</label>
                        <input type="text" id="chapterName" required 
                               placeholder="ex: Word, Excel, Internet...">
                    </div>

                    <div class="form-group">
                        <label for="chapterDescription">Description :</label>
                        <textarea id="chapterDescription" rows="3" required 
                                  placeholder="Objectifs pédagogiques du chapitre..."></textarea>
                    </div>

                    <div class="form-group">
                        <label for="chapterIcon">Icône :</label>
                        <select id="chapterIcon" required>
                            <option value="📝">📝 Word</option>
                            <option value="📊">📊 Excel</option>
                            <option value="🌐">🌐 Internet</option>
                            <option value="⌨️">⌨️ Raccourcis</option>
                            <option value="🔒">🔒 Sécurité</option>
                            <option value="🎯">🎯 Quiz général</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="chapterColor">Couleur du thème :</label>
                        <input type="color" id="chapterColor" value="#3498db">
                    </div>

                    <button type="submit" class="btn-primary">Créer le chapitre</button>
                </form>
            </div>
        </div>
    </div>

    <script src="dashboard.js"></script>
</body>
</html>
